      title: 'Verify email.'
      description: |-
        Marque l'email comme vérifié à partir d'un lien signé (middleware `signed` sur la route).
        Optionnel: redirige vers le frontend si `FRONTEND_URL` est défini.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      id:
        custom: []
        name: id
        description: 'ID user.'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      hash:
        custom: []
        name: hash
        description: SHA1(email).
        required: true
        example: 6b1b36cbb04b41490bfc0ab2bfa26f86a4f37e58
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      id: 1
      hash: 6b1b36cbb04b41490bfc0ab2bfa26f86a4f37e58
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{ "message": "Email verified", "user": { "id": 1, "email": "user@example.com" } }'
        headers: []
        description: ''
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
